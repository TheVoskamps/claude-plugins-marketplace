# Dependabot configuration rendered by /gh-repo-setup-protection.
#
# Placeholders (see the github-setup plugin payload README for the syntax and
# the skill's SKILL.md for how each is resolved):
#
#   __DEFAULT_BRANCH__       Default branch of the target repo. Used as
#                            the `target-branch` for every ecosystem so
#                            Dependabot opens PRs against the right base.
#   __DEPENDABOT_ECOSYSTEMS__  The fully-rendered `updates:` entries for
#                            the package ecosystems detected in the repo
#                            (one block per ecosystem). The skill builds
#                            this list from the per-ecosystem block below
#                            and substitutes it in. If the repo has no
#                            recognized ecosystem, the skill does NOT
#                            install this file at all (see SKILL.md).
#
# This file is the OUTER template. The skill renders one copy of the
# per-ecosystem block (kept in `ecosystem-block.yml` alongside this file)
# for each detected ecosystem, concatenates them, and substitutes the
# result for __DEPENDABOT_ECOSYSTEMS__.
version: 2
updates:
__DEPENDABOT_ECOSYSTEMS__
