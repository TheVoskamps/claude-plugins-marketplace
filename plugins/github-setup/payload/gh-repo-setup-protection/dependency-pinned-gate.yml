# Dependency-pinned-gate workflow rendered by /gh-repo-setup-protection.
#
# Installed at <repo-root>/.github/workflows/dependency-pinned-gate.yml
# (alongside its sibling script at
# <repo-root>/.github/scripts/dependency-pinned-gate.sh) ONLY when the
# target repo's Step 2b pinned-gate resolved set contains at least one
# of the five ecosystems below (see SKILL.md "Step 5d-pinned"). A repo
# with an empty resolved set must NOT get this file: a gate whose jobs
# never find a manifest is dead weight.
#
# Five independent, PER-ECOSYSTEM jobs (`npm`, `pip`, `actions`,
# `docker`, `go`). This is the SIBLING of the dependency-install-gate:
# the install-gate protects the lockfile<->manifest *lock* relationship;
# THIS gate protects how the manifest itself DECLARES versions. A
# package.json with "^2.172.0", a requirements.txt with ">=1.40", a
# workflow `uses: actions/checkout@v4`, or a `FROM node:22` resolves to
# a DIFFERENT concrete version over time even when the lockfile is in
# sync -- the "works on main, breaks on rebase" supply-chain drift that
# slips past a green install-gate. Each job fails the PR when any
# DECLARED dependency in its ecosystem is not pinned to an exact
# version.
#
# PER-JOB RENDERING (the unit of toggling). Each job block below is
# wrapped in `# >>> JOB:<mode>` / `# <<< JOB:<mode>` delimiter comments.
# The skill INCLUDES a job's block only when that ecosystem is in the
# target repo's Step 2b pinned-gate resolved set, and DROPS the whole
# block (delimiters and all) otherwise -- so a toggled-off ecosystem
# never runs and is never a required check (see SKILL.md "Step
# 5d-pinned -> per-job rendering"). The delimiter comment lines are
# themselves stripped from every shipped block; the rendered file
# contains only real jobs, no markers.
#
# Categorical exemptions (legitimately not exact-pinnable) live in the
# sibling script's classifier, NOT a maintained allowlist file:
# npm peerDependencies carets, file:/workspace:/link:/git+ specs,
# engines / requires-python floors, overrides/resolutions classified on
# the override VALUE, and Docker `tag@sha256:` digests (the digest is
# read; the floating tag is allowed alongside it). See the script
# header for the full list.
#
# Pin-check ONLY -- there is NO install / build step. The discovery +
# run-all-then-fail + classifier logic lives in the sibling script
# .github/scripts/dependency-pinned-gate.sh.
#
# Hardening invariants (mirror the dependency-install-gate):
#   - Every action is SHA-pinned (a floating @v4/@v5 tag is a supply-
#     chain risk; the trailing comment records the human-readable tag).
#     The gate would flag its own workflow otherwise.
#   - `permissions: contents: read` (least privilege; the gate only
#     reads the tree).
#   - Each job checks out github.event.pull_request.head.sha so the
#     gate validates the PR head, not a merge commit.
#
# Placeholders:
#   __DEFAULT_BRANCH__   Default branch of the target repo. The gate
#                        runs on pull_request events targeting it.
name: dependency-pinned-gate

on:
  pull_request:
    branches: [__DEFAULT_BRANCH__]

# Least-privilege: the gate only reads the tree to classify declared
# dependency versions. No write scopes are needed.
permissions:
  contents: read

jobs:
# >>> JOB:npm
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Exact-version pin check over discovered package.json files
        run: bash .github/scripts/dependency-pinned-gate.sh npm
# <<< JOB:npm

# >>> JOB:pip
  pip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Exact-version pin check over discovered requirements / pyproject
        run: bash .github/scripts/dependency-pinned-gate.sh pip
# <<< JOB:pip

# >>> JOB:actions
  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: SHA-pin check over discovered workflow `uses:` refs
        run: bash .github/scripts/dependency-pinned-gate.sh actions
# <<< JOB:actions

# >>> JOB:docker
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Digest-pin check over discovered Dockerfile FROM lines
        run: bash .github/scripts/dependency-pinned-gate.sh docker
# <<< JOB:docker

# >>> JOB:go
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Replace-directive pin check over discovered go.mod files
        run: bash .github/scripts/dependency-pinned-gate.sh go
# <<< JOB:go
